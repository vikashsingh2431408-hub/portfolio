<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

  <header>
    <h3>MyPortfolio</h3>
    <nav>
      <a href="#home">Home</a>
      <a href="#about">About</a>
      <a href="#projects">Projects</a>
      <a href="#certificates">Certificates</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <section id="home">
    <div class="home-container">
      <div>
        <h1>
          Hi, My name is <span class="highlight">Vikash</span><br>
          and I am a <span class="highlight">BCA</span> Undergraduate
        </h1>
        <p class="subtitle">Exploring web development, data structures, and creating impactful digital experiences.</p>
        <a href="#contact" class="btn btn-primary mt-4">Get In Touch</a>
      </div>

      <div class="image-circle">
        <img src="./images/vikash.avif" alt="Vikash">
      </div>
    </div>
  </section>

  <section id="about">
    <div class="about-container">
      <h2>About Me</h2>
      <div class="title-underline"></div>

      <p class="about-text" id="about-text-container"></p>

      <div class="about-cards" id="social-cards-container">
      </div>
    </div>
  </section>

  <section id="projects">
    <div class="about-container">
      <h2>Projects</h2>
      <div class="title-underline"></div>
      <div class="projects-grid" id="projects-container">

      </div>
    </div>
  </section>

  <section id="certificates">
    <div class="about-container">
      <h2>Certificates</h2>
      <div class="title-underline"></div>

      <div class="about-cards" id="certificates-container">
      </div>
    </div>
  </section>

  <section id="contact">
    <div class="contact-container">
      <h2>Let's Connect</h2>
      <div class="title-underline"></div>
      <form class="contact-form">
        <div class="input-group">
          <input type="text" placeholder="Name" required>
        </div>
        <div class="input-group">
          <input type="email" placeholder="Email" required>
        </div>
        <div class="input-group">
          <textarea placeholder="Message" rows="5" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Send Message <i class="fas fa-paper-plane"></i></button>
      </form>
    </div>
  </section>

  <footer>
    <p>Made by Vikash Singh © 2026</p>
  </footer>

  <script src="script.js"></script>
</body>

</html>
